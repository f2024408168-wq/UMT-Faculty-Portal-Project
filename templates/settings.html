{% extends "base.html" %}
{% block title %}Settings — UMT Faculty Portal{% endblock %}
{% block content %}
{% set active = 'settings' %}
<div class="page-wrap">
  <div class="breadcrumb"><a href="/dashboard">Home</a> › Settings</div>
  <div class="page-header">
    <h1>Settings</h1>
    <p>Update your faculty profile and password</p>
  </div>

  <div class="card" style="max-width:500px">
    <div class="card-head blue">Profile Information</div>
    <div class="card-body">
      <form method="POST" action="/settings/update">
        <div class="form-group"><label>Employee Code</label><input class="form-control" value="{{ faculty_data.employee_code }}" disabled style="background:#eef2f8;color:var(--text3)"></div>
        <div class="form-group"><label>Full Name</label><input class="form-control" name="name" value="{{ faculty_data.name }}" required></div>
        <div class="form-group"><label>Email</label><input class="form-control" type="email" name="email" value="{{ faculty_data.email }}" required></div>
        <div class="form-group"><label>Department</label><input class="form-control" name="department" value="{{ faculty_data.department }}" required></div>
        <div class="form-group"><label>New Password (leave blank to keep current)</label><input class="form-control" type="password" name="new_password" placeholder="Enter new password"></div>
        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
